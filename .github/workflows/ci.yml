# ---------------------------------------------------------
# GitHub Actions Workflow: Playwright Cross-Browser Tests (Ubuntu Only)
# ---------------------------------------------------------
# Runs Playwright tests on Ubuntu across 3 browsers: Chromium, Firefox, WebKit
# Results are collected and merged into a single Allure report published to GitHub Pages.
# ---------------------------------------------------------

name: Playwright Cross-Browser Tests (Ubuntu)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Run tests only on Ubuntu with 3 browsers
    strategy:
      matrix:
        browser: [chromium, firefox, webkit]
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Install Playwright browsers with system dependencies
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps

      # Step 5: Run tests with pytest + Allure
      - name: Run tests
        run: pytest --browser=${{ matrix.browser }} --alluredir=reports/

      # Step 6: Upload Allure results as artifact
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.browser }}
          path: reports/

  merge-and-publish:
    # This job runs after all test jobs finish
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download all artifacts (browser results)
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: merged-results

      # Step 3: Merge results into one folder
      - name: Merge Allure results
        run: |
          mkdir -p merged-results/all
          cp -r merged-results/*/* merged-results/all/ || true

      # Step 4: Generate unified Allure HTML report
      - name: Generate Allure HTML report
        run: |
          pip install allure-pytest allure-python-commons
          allure generate merged-results/all -o allure-report --clean

      # Step 5: Deploy unified report to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report