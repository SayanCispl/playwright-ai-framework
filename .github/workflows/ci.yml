# ---------------------------------------------------------
# GitHub Actions Workflow: Playwright Cross-OS Tests + Allure
# ---------------------------------------------------------

name: Playwright Cross-OS Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    # Run tests in parallel across OS (browser matrix handled by pytest.ini)
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]   # OS matrix only
    runs-on: ${{ matrix.os }}

    steps:
      # Step 1: Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Python environment
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Step 3: Install Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Install Playwright browsers
      # (--with-deps is Linux-specific, so we use plain install for cross-OS)
      - name: Install Playwright browsers
        run: python -m playwright install

      # Step 5: Run tests with pytest + Allure
      # Browser selection is handled by pytest.ini (addopts = --browser=all)
      - name: Run tests
        run: pytest --alluredir=reports/

      # Step 6: Upload Allure results as artifact
      # Artifact name includes OS for uniqueness
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}
          path: reports/

  merge-and-publish:
    # This job runs after all test jobs finish
    needs: test
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Download all artifacts (OS results)
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: merged-results

      # Step 3: Merge results into one folder
      - name: Merge Allure results
        run: |
          mkdir -p merged-results/all
          cp -r merged-results/*/* merged-results/all/ || true

      # Step 4: Generate unified Allure HTML report
      - name: Generate Allure HTML report
        run: |
          pip install allure-pytest allure-python-commons
          allure generate merged-results/all -o allure-report --clean

      # Step 5: Deploy unified report to GitHub Pages
      # Publishes dashboard at https://<username>.github.io/<repo>/
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
